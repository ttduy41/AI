<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER VOX AI - ULTRA GATEWAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #ff0055; --success: #00ff66; --warning: #ffaa00; --bg-dark: #06040a; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: var(--bg-dark); font-family: 'Rajdhani', sans-serif; color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        /* Hiệu ứng lưới không gian Cyberpunk ngầm */
        body::before { content: ''; position: absolute; width: 200%; height: 200%; background-image: linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg); top: -60%; animation: gridMove 25s linear infinite; z-index: 1; }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 800px; } }
        
        .container { position: relative; z-index: 10; width: 92%; max-width: 440px; background: rgba(14, 8, 24, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.25); border-radius: 24px; padding: 45px 35px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1), inset 0 0 20px rgba(255, 0, 85, 0.05); }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 2px; background: linear-gradient(90deg, var(--primary), #ffffff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); margin-bottom: 5px; text-align: center; }
        .header p { font-size: 13px; color: #8a84a3; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 3px; text-align: center; }
        
        .status-box { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 18px; font-size: 14px; color: #b5b0cd; margin-bottom: 30px; display: flex; flex-direction: column; gap: 8px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.5); }
        .status-item { display: flex; justify-content: space-between; align-items: center; }
        .status-value { color: var(--primary); font-weight: bold; font-family: 'Orbitron', sans-serif; }
        
        .cyber-btn { width: 100%; padding: 16px; font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 700; color: #000000; background: linear-gradient(90deg, var(--primary), #00fffa); border: none; border-radius: 14px; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); transition: all 0.3s ease; }
        .cyber-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 242, 255, 0.6); filter: brightness(1.1); }
        .cyber-btn:disabled { background: #221d30; color: #58536b; box-shadow: none; cursor: not-allowed; border: 1px solid rgba(255,255,255,0.05); }
        
        .reset-btn { width: 100%; margin-top: 15px; padding: 12px; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255, 170, 0, 0.7); background: transparent; border: 1px solid rgba(255, 170, 0, 0.2); border-radius: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .reset-btn:hover { background: rgba(255, 170, 0, 0.1); border-color: var(--warning); color: var(--warning); }
        
        .key-display-area { margin-top: 30px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .key-box { background: rgba(0, 255, 102, 0.03); border: 1px solid rgba(0, 255, 102, 0.3); border-radius: 14px; padding: 18px; font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--success); word-break: break-all; margin-bottom: 15px; text-shadow: 0 0 10px rgba(0, 255, 102, 0.2); text-align: center; }
        .copy-btn { width: 100%; background: transparent; border: 1px solid var(--success); color: var(--success); padding: 12px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; transition: all 0.3s; }
        .copy-btn:hover { background: var(--success); color: #000000; box-shadow: 0 0 15px rgba(0, 255, 102, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CYBER VOX</h1>
            <p>AI Live Assistant Token</p>
        </div>
        <div class="status-box">
            <div class="status-item">
                <span>IP Quet He Thong:</span>
                <span id="user-ip" class="status-value">LOADING...</span>
            </div>
            <div class="status-item">
                <span>Thoi Han Key:</span>
                <span class="status-value" style="color: var(--secondary);">24 HOURS</span>
            </div>
        </div>
        <div>
            <button id="action-btn" class="cyber-btn" onclick="processGetKey()">Khoi Tao Access Key</button>
            <button id="reset-btn" class="reset-btn" onclick="resetKeySystem()">Xoa Du Lieu Khoi Tao Lai</button>
        </div>
        <div id="key-area" class="key-display-area">
            <div class="key-box" id="key-string">FREE-KEY-XXXX-IP</div>
            <button class="copy-btn" onclick="copyKey()">SAO CHÉP ACCESS KEY</button>
        </div>
    </div>

    <script>
        async function fetchUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('user-ip').innerText = data.ip;
                checkKeyRestrictions(data.ip);
            } catch (error) {
                document.getElementById('user-ip').innerText = "NETWORK ERROR";
            }
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function checkKeyRestrictions(ip) {
            const today = getTodayString();
            const localCheck = localStorage.getItem('last_get_date');
            const savedKey = localStorage.getItem('current_active_key');
            const keyTime = localStorage.getItem('key_expiration_time');

            if (savedKey && keyTime && Date.now() < parseInt(keyTime)) {
                hienThiKey(savedKey);
                document.getElementById('action-btn').disabled = true;
                document.getElementById('action-btn').innerText = "KEY HIEN TAI DANG HOAT DONG";
                return;
            }
            if (localCheck === today) {
                document.getElementById('action-btn').disabled = true;
                document.getElementById('action-btn').innerText = "LIMIT: 1 KEY / NGAY";
            }
        }

        function processGetKey() {
            const ip = document.getElementById('user-ip').innerText;
            if(ip === "LOADING..." || ip === "NETWORK ERROR") {
                alert("He thong chua dong bo duoc IP mang công cong!");
                return;
            }
            
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let salt = '';
            for (let i = 0; i < 4; i++) salt += characters.charAt(Math.floor(Math.random() * characters.length));
            
            const keyMoi = `Free-key-${salt}-${ip}`;
            const logicHan_24h = Date.now() + (24 * 60 * 60 * 1000);

            localStorage.setItem('last_get_date', getTodayString());
            localStorage.setItem('current_active_key', keyMoi);
            localStorage.setItem('key_expiration_time', logicHan_24h.toString());

            hienThiKey(keyMoi);
            document.getElementById('action-btn').disabled = true;
            document.getElementById('action-btn').innerText = "CAP PHAT THANH CONG";
        }

        function hienThiKey(key) {
            document.getElementById('key-string').innerText = key;
            document.getElementById('key-area').style.display = 'block';
        }

        function resetKeySystem() {
            if(confirm("Ban co chac chan muon reset dong bo he thong de xin key moi?")) {
                localStorage.clear();
                document.getElementById('key-area').style.display = 'none';
                document.getElementById('action-btn').disabled = false;
                document.getElementById('action-btn').innerText = "Khoi Tao Access Key";
                fetchUserIP();
            }
        }

        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('key-string').innerText).then(() => {
                alert("Da copy ma khoa chua IP vao Clipboard!");
            });
        }
        window.onload = fetchUserIP;
    </script>
</body>
</html>
