<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER VOX AI - GATEWAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff0055;
            --success: #00ff66;
            --bg-dark: #0a0612;
            --glass-bg: rgba(15, 10, 25, 0.7);
            --glass-border: rgba(0, 242, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Hiệu ứng lưới Neon chạy ngầm phía sau tạo chiều sâu */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg);
            top: -50%;
            animation: gridMove 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 600px; }
        }

        /* Quả cầu năng lượng mờ ảo tạo phong cách Glassmorphism */
        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,85,0.2) 0%, transparent 70%);
            top: 20%;
            left: 15%;
            z-index: 1;
            filter: blur(40px);
            animation: floating 6s ease-in-out infinite alternate;
        }

        .glow-orb-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,242,255,0.15) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            z-index: 1;
            filter: blur(50px);
            animation: floating 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            100% { transform: translateY(30px); }
        }

        /* Khung chứa giao diện kính mờ */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            text-align: center;
            transition: all 0.5s ease;
        }

        .container:hover {
            border-color: rgba(0, 242, 255, 0.4);
            box-shadow: 0 20px 60px rgba(0, 242, 255, 0.1);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary), #ffffff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #8a84a3;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        /* Vùng hiển thị trạng thái hệ thống */
        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #b5b0cd;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
        }

        .status-value {
            color: var(--primary);
            font-weight: bold;
        }

        /* Nút tương tác chính */
        .cyber-btn {
            width: 100%;
            padding: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #000000;
            background: linear-gradient(90deg, var(--primary), #00a2ff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.4);
        }

        .cyber-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 242, 255, 0.6);
            filter: brightness(1.1);
        }

        .cyber-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .cyber-btn:disabled {
            background: #2a2538;
            color: #66617a;
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Khung chứa kết quả Key sau khi tạo */
        .key-display-area {
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .key-box {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid rgba(0, 255, 102, 0.3);
            border-radius: 12px;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: var(--success);
            letter-spacing: 1px;
            word-break: break-all;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.05);
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--success);
            color: var(--success);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--success);
            color: #000000;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: #534f66;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>
    <div class="glow-orb-2"></div>

    <div class="container">
        <div class="header">
            <h1>CYBER VOX VOICE</h1>
            <p>Hệ thống xác thực mã khóa</p>
        </div>

        <div class="status-box">
            <div class="status-item">
                <span>IP Của Bạn:</span>
                <span id="user-ip" class="status-value">Đang quét...</span>
            </div>
            <div class="status-item">
                <span>Thời hạn khóa:</span>
                <span class="status-value" style="color: var(--secondary);">24 Giờ</span>
            </div>
        </div>

        <button id="action-btn" class="cyber-btn" onclick="processGetKey()">Khởi Tạo Access Key</button>

        <div id="key-area" class="key-display-area">
            <div class="key-box" id="key-string">FREE-KEY-XXXX-XXXX</div>
            <button class="copy-btn" onclick="copyKey()">SAO CHÉP MÃ KHÓA</button>
        </div>

        <div class="footer">
            SECURE GATEWAY V2.5 • ANTICHEAT PROTECTED
        </div>
    </div>

    <script>
        // Hàm tự động quét IP máy khách ngay khi vừa tải trang
        async function fetchUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('user-ip').innerText = data.ip;
                checkKeyRestrictions(data.ip);
            } catch (error) {
                document.getElementById('user-ip').innerText = "Không thể xác định IP";
            }
        }

        // Định dạng ngày hiện tại (YYYY-MM-DD) để tính chu kỳ ngày
        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        // Kiểm tra xem IP hoặc thiết bị này đã lấy key trong hôm nay chưa
        function checkKeyRestrictions(ip) {
            const today = getTodayString();
            const localCheck = localStorage.getItem('last_get_date');
            const savedIp = localStorage.getItem('last_get_ip');
            const savedKey = localStorage.getItem('current_active_key');
            const keyTime = localStorage.getItem('key_expiration_time');

            // Nếu Key cũ vẫn còn hạn trong vòng 24 giờ, hiển thị lại luôn Key đó cho người dùng
            if (savedKey && keyTime && Date.now() < parseInt(keyTime)) {
                hienThiKey(savedKey);
                document.getElementById('action-btn').disabled = true;
                document.getElementById('action-btn').innerText = "BẠN ĐÃ LẤY KEY HÔM NAY";
                return;
            }

            // Nếu đã qua 24 giờ nhưng cùng 1 ngày và IP đó đã get rồi thì chặn không cho lấy cái mới
            if ((localCheck === today) || (savedIp === ip && localCheck === today)) {
                document.getElementById('action-btn').disabled = true;
                document.getElementById('action-btn').innerText = "MỖI IP CHỈ ĐƯỢC 1 LẦN/NGÀY";
                alert("Hệ thống phát hiện IP hoặc thiết bị này đã thực hiện lấy mã hôm nay. Vui lòng quay lại vào ngày mai!");
            }
        }

        // Hàm tạo chuỗi cấu trúc Key đồng bộ hoàn toàn với App Android
        function generateCyberKey() {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let part1 = '';
            let part2 = '';
            for (let i = 0; i < 4; i++) {
                part1 += characters.charAt(Math.floor(Math.random() * characters.length));
                part2 += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return `Free-key-${part1}-${part2}`;
        }

        // Tiến trình tạo Key và lưu dấu vết chống gian lận
        function processGetKey() {
            const ip = document.getElementById('user-ip').innerText;
            if(ip === "Đang quét..." || ip === "Không thể xác định IP") {
                alert("Đang kiểm tra bảo mật đường truyền IP, vui lòng thử lại sau 2 giây!");
                return;
            }

            const keyMoi = generateCyberKey();
            const logicHạn_24h = Date.now() + (24 * 60 * 60 * 1000); // Thời gian hiện tại + 24 tiếng

            // Lưu dữ liệu vào bộ nhớ máy để thực hiện chặn
            localStorage.setItem('last_get_date', getTodayString());
            localStorage.setItem('last_get_ip', ip);
            localStorage.setItem('current_active_key', keyMoi);
            localStorage.setItem('key_expiration_time', logicHạn_24h.toString());

            hienThiKey(keyMoi);

            document.getElementById('action-btn').disabled = true;
            document.getElementById('action-btn').innerText = "CẤP PHÁT THÀNH CÔNG";
        }

        function hienThiKey(key) {
            document.getElementById('key-string').innerText = key;
            document.getElementById('key-area').style.display = 'block';
        }

        // Hàm sao chép nhanh mã khóa ra bộ nhớ tạm điện thoại
        function copyKey() {
            const txtKey = document.getElementById('key-string').innerText;
            navigator.clipboard.writeText(txtKey).then(() => {
                alert("Đã sao chép mã khóa thành công! Hãy mở App dán vào để kích hoạt.");
            });
        }

        // Kích hoạt tiến trình quét ngay khi người dùng truy cập trang
        window.onload = fetchUserIP;
    </script>
</body>
</html>
